<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WorkTrack Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --glass: rgba(255,255,255,0.75);
            --text: #0f172a;
            --accent: #3b82f6;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --glass: rgba(15, 23, 42, 0.85);
                --text: #e2e8f0;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 20%, #e0f2fe, #c3d4e6);
            color: var(--text);
            padding: 1.5rem;
            min-height: 100vh;
            transition: background 0.4s;
        }
        @media (prefers-color-scheme: dark) {
            body { background: radial-gradient(circle at 30% 20%, #1e2937, #0f172a); }
        }

        .glass-main {
            max-width: 1480px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .stat-glass {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.7);
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-glass:hover { transform: translateY(-4px); }

        .stat-glass span { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-glass .number { font-size: 2rem; font-weight: 700; margin-top: 0.3rem; }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        .glass-card {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.6);
        }

        h2 {
            font-size: 1.35rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1e40af;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.4);
            border-radius: 20px;
            overflow: hidden;
        }
        th, td {
            padding: 0.9rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        th {
            background: #1e40af;
            color: white;
            font-weight: 600;
        }

        .project-color {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        button {
            padding: 0.65rem 1.1rem;
            border-radius: 9999px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); }

        .btn-primary { background: #1e40af; color: white; border: none; }
        .btn-danger { background: #dc2626; color: white; border: none; }
        .btn-secondary { background: #475569; color: white; border: none; }

        .timer-display {
            font-size: 3rem;
            font-family: 'Inter', monospace;
            font-weight: 700;
            text-align: center;
            background: #0f172a;
            color: #fff;
            padding: 1.2rem;
            border-radius: 9999px;
            margin: 1rem 0;
            letter-spacing: 4px;
        }

        .flex-btns {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        input, select {
            padding: 0.75rem 1rem;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            background: rgba(255,255,255,0.9);
        }

        @media (max-width: 900px) {
            .two-col { grid-template-columns: 1fr; }
            .glass-main { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="glass-main">
    <div class="header">
        <h1><i class="fas fa-stopwatch"></i> WorkTrack Pro</h1>
        <button id="themeToggle" style="padding: 0.6rem 1rem; font-size: 1.1rem;">🌙</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-glass"><span>Total heures</span><div class="number" id="statHours">0</div></div>
        <div class="stat-glass"><span>Revenu estimé</span><div class="number" id="statRevenue">0 €</div></div>
        <div class="stat-glass"><span>Projets actifs</span><div class="number" id="statProjects">0</div></div>
        <div class="stat-glass"><span>Sessions</span><div class="number" id="statSessions">0</div></div>
    </div>

    <div class="two-col">
        <!-- Projets -->
        <div class="glass-card">
            <h2><i class="fas fa-briefcase"></i> Projets</h2>
            <div style="overflow-x:auto;">
                <table id="projectsTable">
                    <thead>
                        <tr><th>Projet</th><th>Taux</th><th>Heures</th><th>Revenu</th><th></th></tr>
                    </thead>
                    <tbody id="projectsTableBody"></tbody>
                </table>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr 80px auto; gap: 0.8rem; margin-top: 1.5rem;">
                <input type="text" id="newProjName" placeholder="Nom du projet">
                <input type="number" id="newProjRate" placeholder="Taux €/h" step="0.5">
                <input type="color" id="newProjColor" value="#3b82f6">
                <button id="addProjectBtn" class="btn-primary">Ajouter</button>
            </div>
        </div>

        <!-- Timer -->
        <div class="glass-card">
            <h2><i class="fas fa-hourglass-half"></i> Chronomètre</h2>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            
            <div class="flex-btns">
                <button id="timerStart" class="btn-primary"><i class="fas fa-play"></i> Démarrer</button>
                <button id="timerPause" class="btn-secondary"><i class="fas fa-pause"></i> Pause</button>
                <button id="timerReset" class="btn-secondary"><i class="fas fa-redo"></i> Reset</button>
            </div>

            <select id="timerProjectSelect" style="width:100%; margin: 1rem 0;">
                <option value="">— Sélectionner un projet —</option>
            </select>
            <button id="saveTimerSessionBtn" class="btn-primary" style="width:100%;">Enregistrer cette session</button>
        </div>
    </div>

    <!-- Graphique -->
    <div class="glass-card" style="margin-bottom: 2rem;">
        <h2><i class="fas fa-chart-pie"></i> Répartition des heures</h2>
        <div style="max-width: 320px; margin: 1.5rem auto;">
            <canvas id="hoursChart"></canvas>
        </div>
    </div>

    <!-- Historique -->
    <div class="glass-card">
        <h2><i class="fas fa-history"></i> Historique des sessions</h2>
        <div style="overflow-x:auto;">
            <table id="sessionsTable">
                <thead>
                    <tr><th>Date</th><th>Projet</th><th>Durée</th><th>Revenu</th><th>Notes</th><th></th></tr>
                </thead>
                <tbody id="sessionsTableBody"></tbody>
            </table>
        </div>

        <div style="margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
            <button id="addManualSessionBtn" class="btn-primary">+ Ajouter une session manuelle</button>
            <button id="exportCsvBtn" class="btn-secondary"><i class="fas fa-download"></i> Exporter CSV</button>
            <button id="resetAllBtn" class="btn-danger"><i class="fas fa-trash"></i> Tout réinitialiser</button>
        </div>
    </div>
</div>

<script>
    // ==================== DATA & STATE ====================
    let projects = [];
    let sessions = [];
    let chartInstance = null;
    let timerSeconds = 0;
    let timerInterval = null;
    let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    const $ = id => document.getElementById(id);

    // ==================== LOAD / SAVE ====================
    function loadData() {
        projects = JSON.parse(localStorage.getItem('wt_projects')) || [
            { id: 1, name: "Développement", rate: 55, color: "#3b82f6" }
        ];
        sessions = JSON.parse(localStorage.getItem('wt_sessions')) || [];
        renderAll();
    }

    function saveData() {
        localStorage.setItem('wt_projects', JSON.stringify(projects));
        localStorage.setItem('wt_sessions', JSON.stringify(sessions));
    }

    // ==================== RENDERING ====================
    function renderAll() {
        renderProjects();
        renderSessions();
        updateStats();
        updateChart();
        updateProjectSelects();
    }

    function renderProjects() {
        const tbody = $('projectsTableBody');
        tbody.innerHTML = projects.map(p => {
            const projSessions = sessions.filter(s => s.projectId === p.id);
            const totalHours = projSessions.reduce((sum, s) => sum + s.hours, 0);
            const revenue = totalHours * p.rate;

            return `
                <tr>
                    <td><span class="project-color" style="background:${p.color}"></span> ${escapeHtml(p.name)}</td>
                    <td>${p.rate} €/h</td>
                    <td>${totalHours.toFixed(1)} h</td>
                    <td>${revenue.toFixed(0)} €</td>
                    <td>
                        <button class="edit-btn" data-id="${p.id}" style="padding:4px 8px;">✏️</button>
                        <button class="del-btn" data-id="${p.id}" style="padding:4px 8px;color:#ef4444;">🗑</button>
                    </td>
                </tr>`;
        }).join('');

        // Event listeners
        tbody.querySelectorAll('.del-btn').forEach(btn => {
            btn.onclick = () => deleteProject(+btn.dataset.id);
        });
        tbody.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => editProject(+btn.dataset.id);
        });
    }

    function renderSessions() {
        const tbody = $('sessionsTableBody');
        if (sessions.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:#64748b;">Aucune session enregistrée</td></tr>`;
            return;
        }

        // Tri par date décroissante
        const sorted = [...sessions].sort((a,b) => new Date(b.date) - new Date(a.date));

        tbody.innerHTML = sorted.map(s => {
            const proj = projects.find(p => p.id === s.projectId);
            const revenue = (s.hours * (proj?.rate || 0)).toFixed(2);
            return `
                <tr>
                    <td>${s.date}</td>
                    <td>${escapeHtml(proj?.name || 'Projet supprimé')}</td>
                    <td>${s.hours.toFixed(2)} h</td>
                    <td>${revenue} €</td>
                    <td>${escapeHtml(s.notes || '—')}</td>
                    <td><button class="del-session-btn" data-id="${s.id}">🗑</button></td>
                </tr>`;
        }).join('');

        tbody.querySelectorAll('.del-session-btn').forEach(btn => {
            btn.onclick = () => deleteSession(+btn.dataset.id);
        });
    }

    function updateStats() {
        let totalH = 0, totalRev = 0;
        sessions.forEach(s => {
            const proj = projects.find(p => p.id === s.projectId);
            totalH += s.hours;
            totalRev += s.hours * (proj?.rate || 0);
        });

        $('statHours').textContent = totalH.toFixed(1);
        $('statRevenue').textContent = totalRev.toFixed(0) + ' €';
        $('statProjects').textContent = projects.length;
        $('statSessions').textContent = sessions.length;
    }

    function updateProjectSelects() {
        const options = '<option value="">— Sélectionner un projet —</option>' +
            projects.map(p => `<option value="${p.id}">${escapeHtml(p.name)} (${p.rate}€/h)</option>`).join('');

        $('timerProjectSelect').innerHTML = options;
    }

    function updateChart() {
        const ctx = $('hoursChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const projHours = {};
        projects.forEach(p => projHours[p.id] = 0);
        sessions.forEach(s => {
            if (projHours[s.projectId] !== undefined) projHours[s.projectId] += s.hours;
        });

        const labels = [], data = [], colors = [];
        projects.forEach(p => {
            if (projHours[p.id] > 0) {
                labels.push(p.name);
                data.push(projHours[p.id]);
                colors.push(p.color);
            }
        });

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 3, borderColor: '#fff' }] },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { position: 'bottom', labels: { padding: 20, font: { size: 13 } } } }
            }
        });
    }

    // ==================== CRUD ====================
    function addProject() {
        const name = $('newProjName').value.trim();
        const rate = parseFloat($('newProjRate').value);
        const color = $('newProjColor').value;

        if (!name || !rate || rate <= 0) return alert("Veuillez remplir correctement le projet.");

        projects.push({ id: Date.now(), name, rate, color });
        saveData();
        renderAll();

        $('newProjName').value = '';
        $('newProjRate').value = '';
    }

    function editProject(id) {
        const proj = projects.find(p => p.id === id);
        if (!proj) return;

        const newName = prompt("Nouveau nom du projet :", proj.name);
        if (newName !== null) proj.name = newName.trim();

        const newRate = prompt("Nouveau taux horaire (€) :", proj.rate);
        if (newRate !== null) proj.rate = parseFloat(newRate);

        saveData();
        renderAll();
    }

    function deleteProject(id) {
        if (!confirm("Supprimer ce projet et toutes ses sessions associées ?")) return;
        projects = projects.filter(p => p.id !== id);
        sessions = sessions.filter(s => s.projectId !== id);
        saveData();
        renderAll();
    }

    function addSession(projectId, date, hours, notes = "") {
        if (!projectId || !date || hours <= 0) return false;
        sessions.push({ id: Date.now(), projectId, date, hours, notes });
        saveData();
        renderAll();
        return true;
    }

    function deleteSession(id) {
        if (confirm("Supprimer cette session ?")) {
            sessions = sessions.filter(s => s.id !== id);
            saveData();
            renderAll();
        }
    }

    // ==================== TIMER ====================
    function updateTimerDisplay() {
        const h = Math.floor(timerSeconds / 3600);
        const m = Math.floor((timerSeconds % 3600) / 60);
        const s = timerSeconds % 60;
        $('timerDisplay').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            timerSeconds++;
            updateTimerDisplay();
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function resetTimer() {
        pauseTimer();
        timerSeconds = 0;
        updateTimerDisplay();
    }

    function saveTimerSession() {
        const projId = parseInt($('timerProjectSelect').value);
        const hours = timerSeconds / 3600;
        if (!projId) return alert("Veuillez sélectionner un projet.");
        if (hours <= 0) return alert("Aucune durée à enregistrer.");

        const today = new Date().toISOString().slice(0,10);
        addSession(projId, today, hours, "Session timer");
        resetTimer();
    }

    // ==================== UTILS ====================
    function escapeHtml(text) {
        return text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }

    // ==================== EVENT LISTENERS ====================
    $('addProjectBtn').onclick = addProject;
    $('timerStart').onclick = startTimer;
    $('timerPause').onclick = pauseTimer;
    $('timerReset').onclick = resetTimer;
    $('saveTimerSessionBtn').onclick = saveTimerSession;

    $('exportCsvBtn').onclick = () => {
        let csv = "Date;Projet;Durée;Revenu;Notes\n";
        sessions.forEach(s => {
            const proj = projects.find(p => p.id === s.projectId);
            csv += `"${s.date}";"${proj?.name || ''}";${s.hours};${(s.hours * (proj?.rate || 0)).toFixed(2)};"${(s.notes || '').replace(/"/g, '""')}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `worktrack_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    };

    $('resetAllBtn').onclick = () => {
        if (confirm("⚠️ Supprimer TOUTES les données ? Cette action est irréversible.")) {
            localStorage.clear();
            location.reload();
        }
    };

    // Mode sombre
    $('themeToggle').onclick = () => {
        isDark = !isDark;
        document.documentElement.style.setProperty('--glass', isDark ? 'rgba(15, 23, 42, 0.9)' : 'rgba(255,255,255,0.75)');
        $('themeToggle').textContent = isDark ? '☀️' : '🌙';
    };

    // Initialisation
    loadData();
</script>
</body>
</html>
