<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WorkTrack Pro | Suivi d'heures facturables</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 10% 20%, #e2e8f0, #cbd5e1);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }
        /* Glassmorphism container */
        .glass-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #334155);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sub {
            color: #334155;
            margin-bottom: 2rem;
        }
        /* Grille principale */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .glass-card {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.2s;
        }
        .glass-card h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 0.5rem;
        }
        /* Formulaires */
        input, select, button {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 0.8rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.7);
            font-family: inherit;
        }
        button {
            background: #1e293b;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        button:hover {
            background: #334155;
        }
        .btn-danger {
            background: #b91c1c;
        }
        .btn-danger:hover {
            background: #991b1b;
        }
        .btn-secondary {
            background: #475569;
        }
        /* Liste projets */
        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.6);
            border-radius: 28px;
            padding: 0.7rem 1rem;
            margin-bottom: 0.5rem;
        }
        .project-color {
            width: 24px;
            height: 24px;
            border-radius: 24px;
            display: inline-block;
            margin-right: 0.5rem;
        }
        .delete-proj {
            color: #b91c1c;
            cursor: pointer;
        }
        /* Timer */
        .timer-display {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            font-family: monospace;
            margin: 0.5rem 0;
        }
        .timer-buttons {
            display: flex;
            gap: 0.5rem;
        }
        /* Tableau */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.8rem 0.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .delete-session {
            color: #b91c1c;
            cursor: pointer;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-badge {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 600;
        }
        canvas {
            max-height: 200px;
            margin-top: 1rem;
        }
        @media (max-width: 700px) {
            .glass-container { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="glass-container">
    <h1><i class="fas fa-stopwatch"></i> WorkTrack Pro</h1>
    <div class="sub">Suivi d'heures, timer intégré, export Excel</div>

    <div class="dashboard">
        <!-- Colonne 1 : Projets -->
        <div class="glass-card">
            <h2><i class="fas fa-folder"></i> Projets</h2>
            <input type="text" id="projName" placeholder="Nom du projet">
            <input type="number" id="projRate" placeholder="Taux horaire (€)" step="0.01">
            <input type="color" id="projColor" value="#3b82f6">
            <button id="addProjBtn">➕ Ajouter projet</button>
            <div id="projList"></div>
        </div>

        <!-- Colonne 2 : Timer + ajout session rapide -->
        <div class="glass-card">
            <h2><i class="fas fa-hourglass-half"></i> Chronomètre</h2>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="timer-buttons">
                <button id="timerStart">Démarrer</button>
                <button id="timerPause">Pause</button>
                <button id="timerReset">Réinitialiser</button>
            </div>
            <select id="sessionProjectTimer">
                <option value="">-- Projet --</option>
            </select>
            <button id="saveTimerSession">💾 Enregistrer cette durée</button>
            <hr style="margin: 1rem 0;">
            <h2><i class="fas fa-plus-circle"></i> Session manuelle</h2>
            <input type="date" id="manualDate">
            <select id="manualProject"></select>
            <input type="number" id="manualHours" placeholder="Durée (heures)" step="0.5">
            <input type="text" id="manualNotes" placeholder="Notes (option)">
            <button id="addManualBtn">✅ Ajouter</button>
        </div>

        <!-- Colonne 3 : Statistiques & reset -->
        <div class="glass-card">
            <h2><i class="fas fa-chart-simple"></i> Synthèse</h2>
            <div class="stats">
                <div class="stat-badge"><i class="fas fa-clock"></i> <span id="totalHours">0</span> h</div>
                <div class="stat-badge"><i class="fas fa-euro-sign"></i> <span id="totalRevenue">0</span> €</div>
                <div class="stat-badge"><i class="fas fa-briefcase"></i> <span id="projCount">0</span> projets</div>
            </div>
            <canvas id="hoursChart" width="300" height="200"></canvas>
            <button id="resetAllDataBtn" class="btn-danger" style="margin-top: 1rem;"><i class="fas fa-trash"></i> Réinitialiser tout</button>
            <button id="exportCsvBtn" class="btn-secondary" style="margin-top: 0.5rem;"><i class="fas fa-file-excel"></i> Exporter CSV (Excel)</button>
        </div>
    </div>

    <!-- Tableau des sessions -->
    <div class="glass-card" style="margin-top: 0;">
        <h2><i class="fas fa-history"></i> Historique des sessions</h2>
        <div class="table-wrapper">
            <table id="sessionsTable">
                <thead><tr><th>Date</th><th>Projet</th><th>Durée</th><th>Revenu</th><th>Notes</th><th></th></tr></thead>
                <tbody id="sessionsList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ---------- DONNEES ----------
    let projects = [];
    let sessions = [];
    let chartInstance = null;
    let timerInterval = null;
    let timerSeconds = 0;

    // DOM elements
    const projListDiv = document.getElementById('projList');
    const sessionProjectTimer = document.getElementById('sessionProjectTimer');
    const manualProject = document.getElementById('manualProject');
    const totalHoursSpan = document.getElementById('totalHours');
    const totalRevenueSpan = document.getElementById('totalRevenue');
    const projCountSpan = document.getElementById('projCount');
    const sessionsTbody = document.getElementById('sessionsList');
    const timerDisplay = document.getElementById('timerDisplay');
    const addProjBtn = document.getElementById('addProjBtn');
    const addManualBtn = document.getElementById('addManualBtn');
    const saveTimerBtn = document.getElementById('saveTimerSession');
    const resetAllBtn = document.getElementById('resetAllDataBtn');
    const exportBtn = document.getElementById('exportCsvBtn');

    // Load / Save
    function loadData() {
        const p = localStorage.getItem('wt_projects');
        const s = localStorage.getItem('wt_sessions');
        if(p) projects = JSON.parse(p);
        else projects = [{ id: 1, name: "Développement", rate: 50, color: "#3b82f6" }];
        if(s) sessions = JSON.parse(s);
        else sessions = [];
        renderAll();
    }
    function saveData() {
        localStorage.setItem('wt_projects', JSON.stringify(projects));
        localStorage.setItem('wt_sessions', JSON.stringify(sessions));
    }

    // Ajout projet
    function addProject() {
        const name = document.getElementById('projName').value.trim();
        const rate = parseFloat(document.getElementById('projRate').value);
        const color = document.getElementById('projColor').value;
        if(!name) { alert("Nom requis"); return; }
        if(isNaN(rate) || rate <= 0) { alert("Taux horaire valide"); return; }
        projects.push({ id: Date.now(), name, rate, color });
        saveData();
        renderAll();
        document.getElementById('projName').value = '';
        document.getElementById('projRate').value = '';
    }

    // Supprimer projet
    function deleteProject(projId) {
        if(confirm("Supprimer ce projet et toutes ses sessions ?")) {
            projects = projects.filter(p => p.id !== projId);
            sessions = sessions.filter(s => s.projectId !== projId);
            saveData();
            renderAll();
        }
    }

    // Ajout session (manuel ou timer)
    function addSession(projectId, date, hours, notes) {
        if(!projectId) { alert("Choisissez un projet"); return false; }
        if(!date) { alert("Date requise"); return false; }
        if(isNaN(hours) || hours <= 0) { alert("Durée positive"); return false; }
        sessions.push({ id: Date.now(), projectId, date, hours, notes: notes || "" });
        saveData();
        renderAll();
        return true;
    }

    function deleteSession(sessionId) {
        sessions = sessions.filter(s => s.id !== sessionId);
        saveData();
        renderAll();
    }

    // Timer
    function updateTimerDisplay() {
        const hrs = Math.floor(timerSeconds / 3600);
        const mins = Math.floor((timerSeconds % 3600) / 60);
        const secs = timerSeconds % 60;
        timerDisplay.textContent = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
    function startTimer() { if(timerInterval) return; timerInterval = setInterval(() => { timerSeconds++; updateTimerDisplay(); }, 1000); }
    function pauseTimer() { if(timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer() { pauseTimer(); timerSeconds = 0; updateTimerDisplay(); }
    document.getElementById('timerStart').onclick = startTimer;
    document.getElementById('timerPause').onclick = pauseTimer;
    document.getElementById('timerReset').onclick = resetTimer;
    saveTimerBtn.onclick = () => {
        const projId = parseInt(sessionProjectTimer.value);
        const hours = timerSeconds / 3600;
        if(!projId) { alert("Sélectionnez un projet"); return; }
        if(hours <= 0) { alert("Aucune durée à enregistrer"); return; }
        const today = new Date().toISOString().slice(0,10);
        addSession(projId, today, hours, "timer");
        resetTimer();
    };

    // Rendu projets + selects
    function renderProjectsSelect() {
        const options = '<option value="">-- Projet --</option>' + projects.map(p => `<option value="${p.id}">${p.name} (${p.rate}€/h)</option>`).join('');
        sessionProjectTimer.innerHTML = options;
        manualProject.innerHTML = options;
    }

    function renderProjectList() {
        if(projects.length === 0) { projListDiv.innerHTML = '<p>Aucun projet</p>'; projCountSpan.innerText = '0'; return; }
        projCountSpan.innerText = projects.length;
        projListDiv.innerHTML = projects.map(p => `
            <div class="project-item">
                <div><span class="project-color" style="background:${p.color};"></span> <strong>${escapeHtml(p.name)}</strong> (${p.rate}€/h)</div>
                <div><i class="fas fa-trash delete-proj" data-id="${p.id}"></i></div>
            </div>
        `).join('');
        document.querySelectorAll('.delete-proj').forEach(el => {
            el.addEventListener('click', (e) => deleteProject(parseInt(el.getAttribute('data-id'))));
        });
    }

    function renderSessionsTable() {
        if(sessions.length === 0) { sessionsTbody.innerHTML = '<tr><td colspan="6">Aucune session</td></tr>'; totalHoursSpan.innerText = '0'; totalRevenueSpan.innerText = '0'; return; }
        let totalH = 0, totalRev = 0;
        const rows = sessions.map(s => {
            const proj = projects.find(p => p.id === s.projectId);
            const pName = proj ? proj.name : "Projet supprimé";
            const rate = proj ? proj.rate : 0;
            const revenue = s.hours * rate;
            totalH += s.hours;
            totalRev += revenue;
            return `<tr>
                <td>${s.date}</td>
                <td>${escapeHtml(pName)}</td>
                <td>${s.hours} h</td>
                <td>${revenue.toFixed(2)} €</td>
                <td>${escapeHtml(s.notes || '—')}</td>
                <td><i class="fas fa-trash delete-session" data-id="${s.id}"></i></td>
            </tr>`;
        }).join('');
        sessionsTbody.innerHTML = rows;
        totalHoursSpan.innerText = totalH.toFixed(1);
        totalRevenueSpan.innerText = totalRev.toFixed(2);
        document.querySelectorAll('.delete-session').forEach(el => {
            el.addEventListener('click', (e) => deleteSession(parseInt(el.getAttribute('data-id'))));
        });
    }

    function updateChart() {
        const ctx = document.getElementById('hoursChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        const projHours = {};
        projects.forEach(p => projHours[p.id] = 0);
        sessions.forEach(s => { if(projHours[s.projectId] !== undefined) projHours[s.projectId] += s.hours; });
        const labels = [], data = [], bgColors = [];
        projects.forEach(p => {
            if(projHours[p.id] > 0) {
                labels.push(p.name);
                data.push(projHours[p.id]);
                bgColors.push(p.color);
            }
        });
        if(labels.length === 0) {
            chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: ['Aucune donnée'], datasets: [{ data: [1], backgroundColor: ['#ccc'] }] } });
            return;
        }
        chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: bgColors, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } } });
    }

    function resetAllData() {
        if(confirm("⚠️ Supprimer TOUS les projets et TOUTES les sessions ? Action irréversible.")) {
            projects = [];
            sessions = [];
            saveData();
            renderAll();
        }
    }

    function exportCSV() {
        let csv = "Date;Projet;Durée (heures);Revenu (€);Notes\n";
        sessions.forEach(s => {
            const proj = projects.find(p => p.id === s.projectId);
            const pName = proj ? proj.name : "Projet supprimé";
            const rate = proj ? proj.rate : 0;
            const revenue = (s.hours * rate).toFixed(2);
            csv += `"${s.date}";"${pName}";${s.hours};${revenue};"${(s.notes || "").replace(/"/g, '""')}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "worktrack_sessions.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function renderAll() {
        renderProjectsSelect();
        renderProjectList();
        renderSessionsTable();
        updateChart();
        document.getElementById('manualDate').value = new Date().toISOString().slice(0,10);
    }

    // Event manuel
    addManualBtn.onclick = () => {
        const projectId = parseInt(manualProject.value);
        const date = document.getElementById('manualDate').value;
        const hours = parseFloat(document.getElementById('manualHours').value);
        const notes = document.getElementById('manualNotes').value;
        if(addSession(projectId, date, hours, notes)) {
            document.getElementById('manualHours').value = '';
            document.getElementById('manualNotes').value = '';
        }
    };
    addProjBtn.onclick = addProject;
    resetAllBtn.onclick = resetAllData;
    exportBtn.onclick = exportCSV;
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    loadData();
</script>
</body>
</html>
