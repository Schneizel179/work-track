<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTrack • Temps & Facturation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.85); }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 dark:from-slate-950 dark:to-slate-900 min-h-screen">

<div class="max-w-7xl mx-auto p-6">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl">
                ⏱️
            </div>
            <h1 class="text-3xl font-bold text-slate-800 dark:text-white">WorkTrack</h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-3 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-colors">
                <i class="fas fa-moon text-xl"></i>
            </button>
            <div class="text-sm text-slate-500 dark:text-slate-400">
                <span id="currentDate"></span>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        <div class="glass rounded-3xl p-6 shadow-xl card-hover">
            <p class="text-slate-500 dark:text-slate-400 text-sm">Total heures</p>
            <p id="totalHours" class="text-4xl font-bold text-slate-800 dark:text-white mt-2">0.0</p>
        </div>
        <div class="glass rounded-3xl p-6 shadow-xl card-hover">
            <p class="text-slate-500 dark:text-slate-400 text-sm">Revenu estimé</p>
            <p id="totalRevenue" class="text-4xl font-bold text-emerald-600 dark:text-emerald-500 mt-2">0 €</p>
        </div>
        <div class="glass rounded-3xl p-6 shadow-xl card-hover">
            <p class="text-slate-500 dark:text-slate-400 text-sm">Projets</p>
            <p id="totalProjects" class="text-4xl font-bold text-slate-800 dark:text-white mt-2">0</p>
        </div>
        <div class="glass rounded-3xl p-6 shadow-xl card-hover">
            <p class="text-slate-500 dark:text-slate-400 text-sm">Sessions</p>
            <p id="totalSessions" class="text-4xl font-bold text-slate-800 dark:text-white mt-2">0</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Projets -->
        <div class="lg:col-span-5">
            <div class="glass rounded-3xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <i class="fas fa-briefcase"></i> Projets
                    </h2>
                </div>
                
                <div id="projectsList" class="space-y-3 mb-6"></div>

                <!-- Ajouter projet -->
                <div class="grid grid-cols-12 gap-3">
                    <input id="projName" type="text" placeholder="Nom du projet" 
                           class="col-span-5 px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-blue-500">
                    <input id="projRate" type="number" step="0.5" placeholder="Taux €/h" 
                           class="col-span-3 px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-blue-500">
                    <input id="projColor" type="color" value="#3b82f6" class="col-span-2 h-12 rounded-2xl cursor-pointer">
                    <button id="addProject" 
                            class="col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-2xl transition-colors">
                        Ajouter
                    </button>
                </div>
            </div>
        </div>

        <!-- Timer -->
        <div class="lg:col-span-7">
            <div class="glass rounded-3xl p-8 shadow-xl text-center">
                <h2 class="text-xl font-semibold mb-6 flex items-center justify-center gap-3">
                    <i class="fas fa-stopwatch"></i> Chronomètre
                </h2>
                
                <div id="timerDisplay" class="text-7xl font-mono font-bold tracking-widest text-slate-800 dark:text-white mb-8">
                    00:00:00
                </div>

                <div class="flex justify-center gap-4 mb-8">
                    <button id="startBtn" class="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl flex items-center gap-2 text-lg">
                        <i class="fas fa-play"></i> Démarrer
                    </button>
                    <button id="pauseBtn" class="px-8 py-4 bg-amber-500 hover:bg-amber-600 text-white rounded-3xl flex items-center gap-2 text-lg">
                        <i class="fas fa-pause"></i> Pause
                    </button>
                    <button id="resetBtn" class="px-6 py-4 bg-slate-500 hover:bg-slate-600 text-white rounded-3xl">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>

                <select id="timerProject" class="w-full max-w-md mx-auto px-5 py-4 rounded-3xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                    <option value="">— Choisir un projet —</option>
                </select>

                <button id="saveSessionBtn" class="mt-6 w-full max-w-md mx-auto py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-3xl">
                    💾 Enregistrer la session
                </button>
            </div>
        </div>

        <!-- Graphique -->
        <div class="lg:col-span-7">
            <div class="glass rounded-3xl p-6 shadow-xl">
                <h2 class="text-xl font-semibold mb-4">Répartition des heures</h2>
                <canvas id="hoursChart" class="h-80"></canvas>
            </div>
        </div>

        <!-- Historique rapide -->
        <div class="lg:col-span-5">
            <div class="glass rounded-3xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-semibold">Dernières sessions</h2>
                    <button id="showAllBtn" class="text-blue-600 hover:text-blue-700 text-sm font-medium">
                        Voir tout →
                    </button>
                </div>
                <div id="recentSessions" class="space-y-3 max-h-96 overflow-auto"></div>
            </div>
        </div>
    </div>

    <!-- Boutons actions globales -->
    <div class="fixed bottom-8 right-8 flex gap-3">
        <button id="exportBtn" class="bg-white dark:bg-slate-800 shadow-lg px-6 py-4 rounded-3xl flex items-center gap-3 hover:shadow-xl transition-all">
            <i class="fas fa-download"></i>
            <span class="font-medium">Export CSV</span>
        </button>
        <button id="resetAllBtn" class="bg-red-100 dark:bg-red-900/30 text-red-600 px-6 py-4 rounded-3xl flex items-center gap-3 hover:bg-red-200 transition-all">
            <i class="fas fa-trash"></i>
        </button>
    </div>
</div>

<script>
// ==================== Variables globales ====================
let projects = [];
let sessions = [];
let timerInterval = null;
let seconds = 0;
let chart = null;

// ==================== Utilitaires ====================
const $ = id => document.getElementById(id);

function formatDate(date) {
    return new Date(date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

function saveData() {
    localStorage.setItem('worktrack_projects', JSON.stringify(projects));
    localStorage.setItem('worktrack_sessions', JSON.stringify(sessions));
}

function loadData() {
    projects = JSON.parse(localStorage.getItem('worktrack_projects')) || [
        {id: 1, name: "Développement Web", rate: 65, color: "#3b82f6"}
    ];
    sessions = JSON.parse(localStorage.getItem('worktrack_sessions')) || [];
}

// ==================== Render ====================
function renderProjects() {
    const container = $('projectsList');
    container.innerHTML = projects.map(p => {
        const projHours = sessions.filter(s => s.projectId === p.id).reduce((a, s) => a + s.hours, 0);
        return `
            <div class="flex items-center justify-between bg-white/70 dark:bg-slate-800/70 p-4 rounded-2xl">
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 rounded-xl" style="background: ${p.color}"></div>
                    <div>
                        <p class="font-medium">${p.name}</p>
                        <p class="text-sm text-slate-500">${p.rate} €/h • ${projHours.toFixed(1)}h</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="editProject(${p.id})" class="text-slate-400 hover:text-blue-600 p-2">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="deleteProject(${p.id})" class="text-slate-400 hover:text-red-600 p-2">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>`;
    }).join('');
}

function updateStats() {
    let totalH = 0, totalR = 0;
    sessions.forEach(s => {
        const proj = projects.find(p => p.id === s.projectId);
        totalH += s.hours;
        totalR += s.hours * (proj ? proj.rate : 0);
    });

    $('totalHours').textContent = totalH.toFixed(1);
    $('totalRevenue').textContent = totalR.toFixed(0) + " €";
    $('totalProjects').textContent = projects.length;
    $('totalSessions').textContent = sessions.length;
}

function updateProjectSelect() {
    const select = $('timerProject');
    select.innerHTML = `<option value="">— Choisir un projet —</option>` +
        projects.map(p => `<option value="${p.id}">${p.name} (${p.rate}€/h)</option>`).join('');
}

function updateRecentSessions() {
    const container = $('recentSessions');
    const recent = [...sessions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

    if (recent.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 py-8">Aucune session pour le moment</p>`;
        return;
    }

    container.innerHTML = recent.map(s => {
        const proj = projects.find(p => p.id === s.projectId);
        return `
            <div class="flex justify-between items-center bg-white/60 dark:bg-slate-800/60 p-4 rounded-2xl">
                <div>
                    <p class="font-medium">${proj ? proj.name : 'Projet supprimé'}</p>
                    <p class="text-sm text-slate-500">${formatDate(s.date)}</p>
                </div>
                <div class="text-right">
                    <p class="font-semibold">${s.hours.toFixed(2)}h</p>
                    <p class="text-emerald-600 text-sm">${(s.hours * (proj?.rate || 0)).toFixed(0)} €</p>
                </div>
            </div>`;
    }).join('');
}

function updateChart() {
    const ctx = $('hoursChart').getContext('2d');
    if (chart) chart.destroy();

    const dataMap = {};
    projects.forEach(p => dataMap[p.id] = 0);
    sessions.forEach(s => {
        if (dataMap[s.projectId] !== undefined) dataMap[s.projectId] += s.hours;
    });

    const labels = [], values = [], colors = [];
    projects.forEach(p => {
        if (dataMap[p.id] > 0) {
            labels.push(p.name);
            values.push(dataMap[p.id]);
            colors.push(p.color);
        }
    });

    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{ data: values, backgroundColor: colors, borderWidth: 5, borderColor: '#fff' }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true } }
            }
        }
    });
}

// ==================== Timer ====================
function updateTimer() {
    const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    $('timerDisplay').textContent = `${h}:${m}:${s}`;
}

function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
        seconds++;
        updateTimer();
    }, 1000);
}

function pauseTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer() {
    pauseTimer();
    seconds = 0;
    updateTimer();
}

// ==================== CRUD ====================
function addProject() {
    const name = $('projName').value.trim();
    const rate = parseFloat($('projRate').value);
    const color = $('projColor').value;

    if (!name || !rate) return alert("Veuillez remplir le nom et le taux.");

    projects.push({
        id: Date.now(),
        name,
        rate,
        color
    });

    saveData();
    renderProjects();
    updateProjectSelect();
    updateChart();
    $('projName').value = '';
    $('projRate').value = '';
}

window.editProject = function(id) {
    const p = projects.find(pr => pr.id === id);
    if (!p) return;
    const newName = prompt("Nouveau nom :", p.name);
    if (newName) p.name = newName;
    const newRate = prompt("Nouveau taux (€/h) :", p.rate);
    if (newRate) p.rate = parseFloat(newRate);
    saveData();
    renderAll();
};

window.deleteProject = function(id) {
    if (!confirm("Supprimer ce projet et toutes ses sessions ?")) return;
    projects = projects.filter(p => p.id !== id);
    sessions = sessions.filter(s => s.projectId !== id);
    saveData();
    renderAll();
};

function saveCurrentSession() {
    const projectId = parseInt($('timerProject').value);
    if (!projectId) return alert("Sélectionnez un projet");
    if (seconds === 0) return alert("Aucune durée enregistrée");

    sessions.push({
        id: Date.now(),
        projectId,
        date: new Date().toISOString().split('T')[0],
        hours: seconds / 3600,
        notes: "Session chronomètre"
    });

    saveData();
    resetTimer();
    renderAll();
}

// ==================== Global Render ====================
function renderAll() {
    renderProjects();
    updateStats();
    updateProjectSelect();
    updateRecentSessions();
    updateChart();
}

// ==================== Event Listeners ====================
$('addProject').addEventListener('click', addProject);
$('startBtn').addEventListener('click', startTimer);
$('pauseBtn').addEventListener('click', pauseTimer);
$('resetBtn').addEventListener('click', resetTimer);
$('saveSessionBtn').addEventListener('click', saveCurrentSession);

$('exportBtn').addEventListener('click', () => {
    let csv = "Date;Projet;Heures;Revenu\n";
    sessions.forEach(s => {
        const p = projects.find(pr => pr.id === s.projectId);
        csv += `${s.date};${p ? p.name : ''};${s.hours};${(s.hours * (p?.rate || 0)).toFixed(2)}\n`;
    });
    const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `worktrack_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
});

$('resetAllBtn').addEventListener('click', () => {
    if (confirm("Tout supprimer ? Cette action est irréversible.")) {
        localStorage.clear();
        location.reload();
    }
});

// Dark mode
const toggle = $('themeToggle');
toggle.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    toggle.innerHTML = document.documentElement.classList.contains('dark') 
        ? '<i class="fas fa-sun text-xl"></i>' 
        : '<i class="fas fa-moon text-xl"></i>';
});

// Date du jour
$('currentDate').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

// Initialisation
loadData();
renderAll();
</script>
</body>
</html>
